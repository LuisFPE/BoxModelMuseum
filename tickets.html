<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMM Tickets</title>
    <link rel="stylesheet" href="./css/general.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</head>

<body>
    <section id="Header"></section>

    <!--Ticket form-->
    <div class="card col-8 col-sm-9 col-md-10 start-50 translate-middle-x mt-5 mb-5 pt-4 pb-4 border-primary-subtle">

        <form class="form col-10 mx-auto">
            <div class="mb-2">
                <label>Gallery:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Gallery" id="idBMM" required>
                    <label class="form-check-label" for="idBMM">
                        BMM
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Gallery" id="idBauhaus" required>
                    <label class="form-check-label" for="idBauhaus">
                        Bauhaus
                    </label>
                </div>
                <div class="d-none text-danger" id="valGallery">
                    A gallery must be selected.
                </div>
            </div>

            <div class="mb-2">
                <label for="inputName" class="form-label">Full Name: </label>
                <input class="form-control" type="text" class="form-control" name="FullName" id="inputName" required>
                <div class="d-none text-danger" id="valName">
                    This field cannot be empty.
                </div>
            </div>

            <div class="mb-2">
                <label for="inputEmail" class="form-label">E-mail: </label>
                <input type="text" class="form-control" name="Mail" id="inputEmail" required>
                <div class="d-none text-danger" id="valEmail">
                    This field cannot be empty.
                </div>
            </div>

            <div class="mb-2">
                <label for="tSlot">Date:</label>

                <select class="form-select" name="tSlot" id="idMonth">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>

                <select class="form-select" name="tSlot" id="idDay">
                    <option value="1">1st</option>
                    <option value="2">2nd</option>
                    <option value="3">3rd</option>
                    <option value="4">4th</option>
                    <option value="5">5th</option>
                    <option value="6">6th</option>
                    <option value="7">7th</option>
                    <option value="8">8th</option>
                    <option value="9">9th</option>
                    <option value="10">10th</option>
                    <option value="11">11th</option>
                    <option value="12">12th</option>
                    <option value="13">13th</option>
                    <option value="14">14th</option>
                    <option value="15">15th</option>
                    <option value="16">16th</option>
                    <option value="17">17th</option>
                    <option value="18">18th</option>
                    <option value="19">19th</option>
                    <option value="20">20th</option>
                    <option value="21">21st</option>
                    <option value="22">22nd</option>
                    <option value="23">23rd</option>
                    <option value="24">24th</option>
                    <option value="25">25th</option>
                    <option value="26">26th</option>
                    <option value="27">27th</option>
                    <option value="28">28th</option>
                    <option value="29">29th</option>
                    <option value="30">30th</option>
                    <option value="31">31th</option>
                </select>

                <select class="form-select" name="tSlot" id="idYear">
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
                <div class="d-none text-danger" id="valDate">
                    The date selected must be a valid one.
                </div>
            </div>

            <div class="mb-2">
                <div class="field">
                    <label for="idTime">Time Slot:</label>
                    <select class="form-select" name="Tslot" id="idTime">
                        <option value="1">8:30 am - 11:59 am</option>
                        <option value="2">12:00 am - 4:59 pm</option>
                        <option value="3">5:00 pm - 9:59 pm</option>
                    </select>
                </div>
            </div>

            <div class="mb-2">
                <label>Ticket Type:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Type" id="idAdult" required>
                    <label class="form-check-label" for="idAdult">
                        Adult
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Type" id="idStudent" required>
                    <label class="form-check-label" for="idStudent">
                        Student
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Type" id="idChild" required>
                    <label class="form-check-label" for="idChild">
                        Child
                    </label>
                </div>
                <div class="d-none text-danger" id="valType">
                    A ticket type must be selected.
                </div>
            </div>

            <div class="mb-2">
                <label for="idQuantity">Quantity:</label>

                <select class="form-select" name="Quantity" id="idQuantity">
                    <option value=1>1</option>
                    <option value=2>2</option>
                    <option value=3>3</option>
                    <option value=4>4</option>
                    <option value=5>5</option>
                    <option value=6>6</option>
                </select>
            </div>

            <div class="mb-2 form-check">
                <input type="checkbox" class="form-check-input" id="idVisit" name="Gvisit" value="">
                <label class="form-check-label" for="idVisit">Guided Visit</label>
            </div>

            <div class="mb-2">
                <label for="idDiscount" class="form-label">Discount Code: </label>
                <input type="text" class="form-control" name="discount" id="idDiscount">
            </div>

            <button type="button" onclick="submitData()" class="btn btn-primary bg-primary-subtle text-dark border-0"
                data-bs-toggle="modal" data-bs-target="#response">
                Calculate
            </button>
        </form>
    </div>

    <!--Form response-->
    <div class="modal fade border-primary-subtle" id="response" tabindex="-1" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered border-primary-subtle">
            <div class="modal-content border-primary-subtle">
                <div class="modal-header border-primary-subtle">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Ticket purchase</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="retGallery"></div>
                    <div id="retName"></div>
                    <div id="retMail"></div>
                    <div id="retDate"></div>
                    <div id="retTime"></div>
                    <div id="retAge"></div>
                    <div id="retQuantity"></div>
                    <div id="retGuide"></div>
                    <div id="retDiscount"></div>
                    <div id="retTotal"></div>
                </div>
                <div class="modal-footer" id="modalFooter">
                    <button type="button" class="btn btn-secondary bg-danger-subtle border-0 text-dark" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary bg-primary-subtle border-0 text-dark" data-bs-dismiss="modal">Confirm purchase</button>
                </div>
            </div>
        </div>
    </div>
    <section id="Footer"></section>

    <script src="js/all.js"></script>
    <script src="./js/tickets.js"></script>
</body>
</html>
